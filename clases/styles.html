<style>
/* ── Paleta UST ─────────────────────────────────────── */
:root {
  --ust-green:      #1D5C35;
  --ust-lime:       #8FA62A;
  --ust-green-soft: #e8f0eb;
  --ust-dark:       #1a1a1a;
  --ust-gray:       #555555;
}

/* ── Tipografía base ─────────────────────────────────── */
.reveal,
.reveal h1,
.reveal h2,
.reveal h3,
.reveal h4 {
  font-family: "Calibri Light", "Calibri", "Segoe UI", sans-serif;
}

.reveal h1 { font-size: 1.9em; color: var(--ust-green); font-weight: 700; }
.reveal h2 { font-size: 1.3em; color: var(--ust-green); font-weight: 600; border-bottom: 2px solid var(--ust-lime); padding-bottom: 0.15em; margin-bottom: 0.5em; }
.reveal h3 { font-size: 1.0em; color: var(--ust-gray);  font-weight: 600; }

.reveal .slides section { font-size: 0.90em; color: var(--ust-dark); }

/* ── Slide de portada (primera sección #) ───────────── */
.reveal .slides section.title-slide,
.reveal .slides > section:first-child {
  background-color: var(--ust-green) !important;
  color: #ffffff !important;
}
.reveal .slides section.title-slide h1,
.reveal .slides > section:first-child h1 { color: #ffffff; border: none; }
.reveal .slides section.title-slide h2,
.reveal .slides > section:first-child h2 { color: var(--ust-lime); border-color: var(--ust-lime); }
.reveal .slides section.title-slide p,
.reveal .slides > section:first-child p   { color: #e0e0e0; }

/* ── Slides de separación de sección (#) ────────────── */
.reveal .slides section.level1 > h1 {
  background: linear-gradient(135deg, var(--ust-green), #2d7a4a);
  color: #ffffff;
  padding: 0.4em 0.7em;
  border-radius: 4px;
  border: none;
}

/* ── Links ───────────────────────────────────────────── */
.reveal a { color: var(--ust-lime); }
.reveal a:hover { color: var(--ust-green); }

/* ── Tablas ──────────────────────────────────────────── */
.reveal table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.88em;
}
.reveal table th {
  background-color: var(--ust-green);
  color: #ffffff;
  padding: 0.4em 0.7em;
  text-align: left;
}
.reveal table td {
  padding: 0.35em 0.7em;
  border-bottom: 1px solid #d0d0d0;
}
.reveal table tr:nth-child(even) td { background-color: var(--ust-green-soft); }

/* ── Código ──────────────────────────────────────────── */
.reveal pre { border-left: 4px solid var(--ust-lime); border-radius: 4px; }
.reveal code { color: var(--ust-green); }
.code-tight pre code { font-size: 0.72em; }
.code-tight pre { width: 100%; }

/* ── Utilidades de tamaño ────────────────────────────── */
.smaller  { font-size: 82%; }
.tiny     { font-size: 68%; }
.compact  { font-size: 78%; }
.smaller table { font-size: 0.82em; }

/* ── Columnas ────────────────────────────────────────── */
.reveal .slides section .columns { align-items: flex-start; }

/* ── Callout / destacado ─────────────────────────────── */
.ust-box {
  background: var(--ust-green-soft);
  border-left: 5px solid var(--ust-green);
  padding: 0.6em 1em;
  border-radius: 4px;
  margin: 0.5em 0;
}

/* ── Footer y número de slide ────────────────────────── */
.reveal .footer { font-size: 0.7em; color: var(--ust-gray); }
.reveal .slide-number { color: var(--ust-green); font-weight: 600; }
</style>
